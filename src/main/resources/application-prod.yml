# Production Environment Configuration
# Used when SPRING_PROFILES_ACTIVE=prod
# Firebase/Firestore access via Application Default Credentials (Cloud Run service account)

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  servlet:
    context-path: /api
  port: ${PORT:8080}
  forward-headers-strategy: native

logging:
  level:
    com.separrone.catalystcodex: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  frontend-url: ${FRONTEND_URL:https://separrone.com}
