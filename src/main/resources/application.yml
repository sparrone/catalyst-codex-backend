# Base Application Configuration
# This configuration is shared across all environments
# Environment-specific overrides are in application-{profile}.yml

spring:
  application:
    name: catalyst-codex-backend

  # Default Profile (will be overridden by SPRING_PROFILES_ACTIVE)
  profiles:
    default: dev


  # Jackson JSON Configuration
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

# Management & Health Check Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized