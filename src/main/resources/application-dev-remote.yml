# Remote Development Environment Configuration (Google Cloud Run)
# This file is used when SPRING_PROFILES_ACTIVE=dev-remote

spring:
  # Remote Dev Database Configuration (SQLite in container)
  datasource:
    url: jdbc:sqlite:/app/data/awakening-dev-remote.db
    driver-class-name: org.sqlite.JDBC
    
    # Basic connection settings for SQLite
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000

  # JPA Configuration for Remote Development
  jpa:
    hibernate:
      # update: Automatically update schema but preserve data
      ddl-auto: update
    show-sql: false # Disable SQL logging in remote environment for performance
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  # Email Configuration for Remote Development
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Server Configuration
server:
  servlet:
    context-path: /api
  port: ${PORT:8080} # Render provides PORT environment variable

# Logging Configuration for Remote Development  
logging:
  level:
    com.separrone.awakeningbackend: DEBUG
    org.springframework.security: INFO # Less verbose than local dev
    org.hibernate: INFO # Less verbose than local dev
    root: INFO
  
  # Structured logging for better Render log readability
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"