# Development Environment Configuration
# Requires: gcloud auth application-default login (for Firebase/Firestore access)

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  servlet:
    context-path: /api
  port: 8080

logging:
  level:
    com.separrone.awakeningbackend: DEBUG
    org.springframework.web: DEBUG
